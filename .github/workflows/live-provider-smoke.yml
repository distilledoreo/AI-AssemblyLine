name: Live Provider Smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live-provider-smoke:
    name: Live provider API smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      STABILITY_API_KEY: ${{ secrets.STABILITY_API_KEY }}
      RUNWAYML_API_SECRET: ${{ secrets.RUNWAYML_API_SECRET }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
      RELEASE_READINESS_GITHUB_SECRETS_MODE: env
      OPENAI_SMOKE_MODEL: ${{ vars.OPENAI_SMOKE_MODEL }}
      STABILITY_SMOKE_MODEL: ${{ vars.STABILITY_SMOKE_MODEL }}
      RUNWAY_SMOKE_MODEL: ${{ vars.RUNWAY_SMOKE_MODEL }}
      GOOGLE_VEO_SMOKE_MODEL: ${{ vars.GOOGLE_VEO_SMOKE_MODEL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check release readiness
        run: npm run release:readiness

      - name: Run live provider smoke suite
        run: npm run smoke:providers
