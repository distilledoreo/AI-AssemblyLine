name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Verify app
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CI: true
      DATABASE_URL: postgresql://assemblyline:assemblyline@localhost:5432/assemblyline
      REDIS_URL: redis://localhost:6379
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-nextauth-secret-with-at-least-32-chars
      ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      STORAGE_ROOT: ./storage

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Validate Prisma schema
        run: npm run prisma:validate

      - name: Run dependency audit
        run: npm run security:audit

      - name: Run unit and integration tests
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Run Playwright E2E tests
        run: npm run test:e2e
        env:
          QUEUE_MODE: inline
          REPOSITORY_MODE: memory

  production-infrastructure-preflight:
    name: Production infrastructure preflight
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: assemblyline
          POSTGRES_PASSWORD: assemblyline
          POSTGRES_DB: assemblyline
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U assemblyline -d assemblyline"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      CI: true
      NODE_ENV: production
      DATABASE_URL: postgresql://assemblyline:assemblyline@localhost:5432/assemblyline
      REDIS_URL: redis://localhost:6379
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-production-preflight-secret-32-plus-chars
      ENCRYPTION_KEY: BAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQ=
      STORAGE_ROOT: ./storage-ci
      QUEUE_MODE: redis
      REPOSITORY_MODE: prisma
      # Synthetic non-secret values exercise the production preflight key-shape gate.
      # Live provider API calls remain covered only by the explicit smoke commands.
      OPENAI_API_KEY: sk-prod-ci-openai-preflight-shape
      STABILITY_API_KEY: sk-prod-ci-stability-preflight-shape
      RUNWAYML_API_SECRET: rw-prod-ci-runway-preflight-shape
      GEMINI_API_KEY: gemini-prod-ci-veo-preflight-shape

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Apply Prisma migrations
        run: npm run prisma:migrate:deploy

      - name: Run production infrastructure preflight
        run: npm run preflight:production

      - name: Run Prisma repository smoke
        run: npm run smoke:prisma-repository

      - name: Run Redis queue and pub/sub smoke
        run: npm run smoke:redis-queue
